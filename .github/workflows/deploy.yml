name: Deploy to Server

on:
  push:
    branches:
      - main  # Exécuter le workflow uniquement sur la branche principale

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Vérifier le code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Configurer l'accès SSH
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.5.3
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      # 3. Installer les dépendances et effectuer le build
      - name: Install dependencies and build
        run: |
          npm install
          npm run build

      # 4. Déployer sur le serveur distant
      - name: Deploy to Server
       run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} "rm -rf /var/www/temp/*"
          scp -r dist/* ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:/var/www/temp/
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} "mv /var/www/temp/* /var/www/html/"

      # 5. Confirmation de déploiement
      - name: Confirm successful deployment
        run: echo "Déploiement réussi sur le serveur !"
